<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#732638" />
      <stop offset="50%" stop-color="#4A1C28" />
      <stop offset="100%" stop-color="#2C0E17" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF5DF" />
      <stop offset="50%" stop-color="#E8C374" />
      <stop offset="100%" stop-color="#C59B38" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB3C6" />
      <stop offset="50%" stop-color="#D86C86" />
      <stop offset="100%" stop-color="#A63C56" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Luxury Burgundy Rounded Box -->
  <rect x="2" y="2" width="60" height="60" rx="16" ry="16" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="2.5" />
  
  <!-- Subtle Rose Gold Glow -->
  <circle cx="20" cy="20" r="18" fill="url(#roseGrad)" opacity="0.2" filter="url(#glow)" />

  <!-- Decorative Crescent Sleep Accent -->
  <path d="M 44 14 C 41 14 38 16 38 19 C 38 23 42 26 46 26 C 45 28 42 30 39 30 C 34 30 30 26 30 21 C 30 16 34 12 39 12 C 41 12 43 13 44 14 Z" fill="url(#goldGrad)" opacity="0.35" />

  <!-- Elegant Monogram P -->
  <text x="31" y="44" font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" font-size="36" font-weight="900" font-style="italic" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="-1">P</text>
  
  <!-- Golden Sparkle 1 -->
  <path d="M 46 16 L 47.5 19.5 L 51 21 L 47.5 22.5 L 46 26 L 44.5 22.5 L 41 21 L 44.5 19.5 Z" fill="url(#goldGrad)" />

  <!-- Rose Gold Sparkle 2 -->
  <path d="M 17 40 L 18 42 L 20 43 L 18 44 L 17 46 L 16 44 L 14 43 L 16 42 Z" fill="url(#roseGrad)" opacity="0.85" />
</svg>