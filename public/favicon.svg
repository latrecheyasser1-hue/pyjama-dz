<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Ultra Luxury Minimalist Gradients -->
    <linearGradient id="burgundyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A2234" />
      <stop offset="100%" stop-color="#4E121F" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5BC94" />
      <stop offset="50%" stop-color="#C9966E" />
      <stop offset="100%" stop-color="#A8754E" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FDF6F6" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#4E121F" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Background Luxury Badge -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#burgundyGrad)" stroke-width="12" />
  <circle cx="256" cy="256" r="218" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-dasharray="16 8" opacity="0.6" />

  <g filter="url(#softShadow)">
    <!-- MINIMALIST FASHION HANGER -->
    <!-- Hanger Hook -->
    <path d="M 256 185 L 256 150 C 256 125, 280 125, 280 105 C 280 85, 230 85, 230 115 C 230 135, 245 140, 245 135" fill="none" stroke="url(#burgundyGrad)" stroke-width="14" stroke-linecap="round" />
    <!-- Hanger Shoulders & Bottom Bar -->
    <path d="M 256 185 L 120 255 Q 110 260, 120 265 L 392 265 Q 402 260, 392 255 Z" fill="none" stroke="url(#burgundyGrad)" stroke-width="14" stroke-linejoin="round" />

    <!-- CRESCENT MOON & DIAMOND STARS (Inside Hanger Frame) -->
    <!-- Crescent Moon -->
    <path d="M 235 195 C 215 195, 200 210, 200 225 C 200 240, 215 255, 235 255 C 225 250, 220 238, 220 225 C 220 212, 225 200, 235 195 Z" fill="url(#goldGrad)" />
    <!-- Diamond Star 1 -->
    <path d="M 280 205 L 283 217 L 295 220 L 283 223 L 280 235 L 277 223 L 265 220 L 277 217 Z" fill="url(#goldGrad)" />
    <!-- Diamond Star 2 (Small) -->
    <path d="M 315 228 L 317 233 L 322 235 L 317 237 L 315 242 L 313 237 L 308 235 L 313 233 Z" fill="url(#burgundyGrad)" opacity="0.65" />
  </g>

  <!-- SLEEK MINIMALIST TYPOGRAPHY -->
  <text x="256" y="345" font-family="'Outfit', 'Montserrat', 'Helvetica Neue', sans-serif" font-size="46" font-weight="900" fill="url(#burgundyGrad)" text-anchor="middle" letter-spacing="8">PYJAMA DZ</text>
  <text x="256" y="388" font-family="'Outfit', 'Montserrat', 'Helvetica Neue', sans-serif" font-size="18" font-weight="600" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="10">HOMEWEAR &amp; LUXE</text>

  <!-- Bottom Decorative Accent -->
  <line x1="200" y1="425" x2="312" y2="425" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  <circle cx="256" cy="425" r="5" fill="url(#burgundyGrad)" />
</svg>